name: Kilted Binary Main
on:
  workflow_dispatch:
  pull_request:
    branches:
      - kilted
  push:
    branches:
      - kilted
  schedule:
    - cron: '13 4 * * *'

jobs:
  kilted_binary_main:
    uses: ./.github/workflows/reusable_ici.yml
    with:
      ros_distro: kilted
      ros_repo: main
      ref_for_scheduled_build: kilted
